<div class="container">
  <h1>Task Manager</h1>
  <div class="add-form">
    <input [(ngModel)]="newTitle" placeholder="New task title..." (keyup.enter)="add()" />
    <select [(ngModel)]="newPriority">
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>
    <button (click)="add()">Add Task</button>
  </div>
  <div class="filters">
    <button [class.active]="filter==='all'" (click)="filter='all'">All</button>
    <button [class.active]="filter==='active'" (click)="filter='active'">Active</button>
    <button [class.active]="filter==='completed'" (click)="filter='completed'">Completed</button>
  </div>
  <ul class="task-list">
    @for (task of filtered; track task.id) {
      <li [class.done]="task.completed">
        <input type="checkbox" [checked]="task.completed" (change)="toggle(task.id)" />
        <span class="title">{{ task.title }}</span>
        <span class="badge {{ task.priority }}">{{ task.priority }}</span>
        <button class="del" (click)="delete(task.id)">✕</button>
      </li>
    }
  </ul>
  <p class="summary">{{ tasks.length }} total · {{ filtered.length }} shown</p>
</div>
